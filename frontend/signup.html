<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/css/intlTelInput.css">
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/intlTelInput.min.js"></script>
</head>

<body class="auth-body">

<div class="auth-box">

<h2>Sign Up</h2>

<input type="text" id="signup-name" placeholder="Full Name">

<input type="email" id="signup-email" placeholder="Email">

<input type="tel" id="signup-mobile" placeholder="Enter mobile number">

<div class="password-box">
<input type="password" id="signup-password" placeholder="Password">
<span class="toggle-eye">👁️</span>
</div>

<small id="password-strength"></small>

<div class="password-box">
<input type="password" id="signup-confirm" placeholder="Confirm Password">
<span class="toggle-eye">👁️</span>
</div>

<div class="checkbox">
<input type="checkbox" id="terms">
<label for="terms">I agree to Terms & Privacy</label>
</div>

<button class="auth-btn" id="signup-btn">Create Account</button>
<button class="google-btn" onclick="googleLogin()">
Sign up with Google
</button>

<p class="auth-link">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>
function googleLogin(){
  window.location.href =
  "https://expense-manager-backend-2z6k.onrender.com/api/auth/google";
}
</script>
<script src="script.js"></script>

</body>
</html>
